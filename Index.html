<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iqra' 90 — Apprendre à lire le Coran en 90 jours</title>
<style>
:root{
  --paper:#F7F1E3;
  --paper2:#EFE6D2;
  --ink:#17241F;
  --green:#0E5B47;
  --green-dark:#093D30;
  --gold:#B98A2E;
  --gold-soft:#E8D6A8;
  --rule:#E0D4BA;
  --brick:#A8442E;
  --ok:#2E7D5B;
  --radius:14px;
  --shadow:0 2px 10px rgba(23,36,31,.08);
  --ar-font:"Noto Naskh Arabic","Amiri","Scheherazade New","Traditional Arabic","Geeza Pro","Arabic Typesetting",serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  min-height:100vh;
  padding-bottom:76px;
}
.ar{font-family:var(--ar-font);direction:rtl;unicode-bidi:isolate;line-height:2}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,a:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}

/* ---------- Header ---------- */
header{
  background:var(--green);
  color:#F6F0E0;
  padding:14px 16px 12px;
  position:sticky;top:0;z-index:40;
  box-shadow:0 2px 8px rgba(9,61,48,.25);
}
.hdr-row{display:flex;align-items:center;justify-content:space-between;max-width:680px;margin:0 auto}
.hdr-title{font-size:1.05rem;font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
.hdr-title .ar{font-size:1.35rem;line-height:1;color:var(--gold-soft)}
.hdr-meta{display:flex;gap:8px;align-items:center;font-size:.8rem}
.badge{
  background:rgba(246,240,224,.14);
  border:1px solid rgba(246,240,224,.28);
  border-radius:999px;padding:3px 10px;font-weight:600;white-space:nowrap;
}
.badge.gold{background:var(--gold);border-color:var(--gold);color:#241A05}
.day-ribbon{
  max-width:680px;margin:10px auto 0;display:flex;align-items:center;gap:10px;
}
.day-ribbon .bar{flex:1;height:6px;background:rgba(246,240,224,.18);border-radius:99px;overflow:hidden}
.day-ribbon .bar>div{height:100%;background:var(--gold);border-radius:99px;transition:width .4s}
.day-ribbon .lbl{font-size:.75rem;opacity:.9;white-space:nowrap}

/* ---------- Layout ---------- */
main{max-width:680px;margin:0 auto;padding:18px 14px 30px}
.card{
  background:#FCF8EE;
  border:1px solid var(--rule);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  margin-bottom:14px;
}
.eyebrow{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;
  color:var(--green);font-weight:700;margin-bottom:6px;
}
h2{font-size:1.15rem;margin-bottom:8px}
h3{font-size:1rem;margin:14px 0 6px}
p{line-height:1.55;font-size:.94rem}
.muted{color:#5d6a63;font-size:.85rem}
.small{font-size:.8rem}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--green);color:#F6F0E0;font-weight:700;font-size:.95rem;
  border-radius:12px;padding:13px 20px;width:100%;
  transition:transform .08s, background .15s;
}
.btn:active{transform:scale(.98)}
.btn.secondary{background:transparent;color:var(--green);border:2px solid var(--green)}
.btn.gold{background:var(--gold);color:#241A05}
.btn.ghost{background:var(--paper2);color:var(--ink);font-weight:600}
.btn.small-btn{width:auto;padding:8px 14px;font-size:.85rem}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn-row .btn{flex:1}

/* ---------- Bottom nav ---------- */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:#FCF8EE;border-top:1px solid var(--rule);
  display:flex;justify-content:space-around;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
nav button{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:.62rem;font-weight:600;color:#7a8680;padding:4px 8px;border-radius:10px;
  min-width:52px;
}
nav button .ic{font-size:1.15rem;line-height:1}
nav button.active{color:var(--green)}
nav button.active .ic{transform:scale(1.1)}

/* ---------- Lettres / arabe ---------- */
.big-ar{font-family:var(--ar-font);font-size:4.6rem;line-height:1.4;text-align:center;direction:rtl}
.mid-ar{font-family:var(--ar-font);font-size:2.1rem;line-height:1.9;direction:rtl;text-align:right}
.forms-row{display:flex;justify-content:space-around;gap:6px;margin-top:10px;direction:rtl}
.form-cell{text-align:center;flex:1;background:var(--paper2);border-radius:10px;padding:8px 4px}
.form-cell .f{font-family:var(--ar-font);font-size:1.9rem;line-height:1.6}
.form-cell .t{font-size:.62rem;color:#5d6a63;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.harakat-row{display:flex;justify-content:space-around;gap:6px;margin-top:10px;direction:rtl}
.harakat-cell{text-align:center;flex:1;border:1px dashed var(--gold);border-radius:10px;padding:6px 2px}
.harakat-cell .f{font-family:var(--ar-font);font-size:2rem;line-height:1.7;color:var(--green-dark)}
.harakat-cell .t{font-size:.68rem;color:#5d6a63}

.letter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;direction:rtl}
.letter-tile{
  background:#FCF8EE;border:1px solid var(--rule);border-radius:12px;
  padding:8px 4px 6px;text-align:center;position:relative;
}
.letter-tile .g{font-family:var(--ar-font);font-size:2rem;line-height:1.5}
.letter-tile .n{font-size:.62rem;color:#5d6a63;direction:ltr}
.letter-tile .m{height:4px;border-radius:99px;background:var(--paper2);margin-top:5px;overflow:hidden}
.letter-tile .m>div{height:100%;background:var(--ok)}
.letter-tile.locked{opacity:.35}

/* ---------- Flashcard ---------- */
.flash{
  min-height:270px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#FCF8EE;border:1px solid var(--rule);border-radius:18px;box-shadow:var(--shadow);
  padding:22px;text-align:center;cursor:pointer;user-select:none;
}
.flash .hint{font-size:.75rem;color:#8b968f;margin-top:14px}

/* ---------- QCM ---------- */
.qcm-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.qcm-opt{
  background:#FCF8EE;border:2px solid var(--rule);border-radius:14px;
  padding:14px 6px;text-align:center;font-family:var(--ar-font);font-size:2.4rem;line-height:1.5;
  transition:border-color .15s, background .15s;direction:rtl;
}
.qcm-opt.fr{font-family:inherit;font-size:.95rem;font-weight:600;line-height:1.4;padding:16px 8px}
.qcm-opt.good{border-color:var(--ok);background:#E7F2EA}
.qcm-opt.bad{border-color:var(--brick);background:#F6E4DE}

/* ---------- Lecture / mushaf ---------- */
.mushaf{
  background:linear-gradient(#FCF8EE,#F8F1DE);
  border:1px solid var(--gold-soft);
  border-radius:16px;
  box-shadow:inset 0 0 0 4px #FCF8EE, inset 0 0 0 5px var(--gold-soft), var(--shadow);
  padding:22px 18px;
}
.mushaf .ar{font-size:1.75rem;line-height:2.4;text-align:center;word-spacing:.15em}
.vnum{
  display:inline-flex;align-items:center;justify-content:center;
  width:1.5em;height:1.5em;border:1.5px solid var(--gold);border-radius:50%;
  font-size:.55em;color:var(--green-dark);margin:0 .25em;vertical-align:middle;font-family:inherit;
}
.w{padding:0 2px;border-radius:6px;cursor:pointer}
.w.masked{background:var(--gold-soft);color:transparent;border-radius:8px;text-shadow:none}
.w.masked:active{background:var(--gold)}
.w.revealed{background:#F1E4C2;color:var(--brick)}
.gloss-pop{
  position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:60;
  background:var(--green-dark);color:#F6F0E0;border-radius:12px;padding:10px 16px;
  font-size:.9rem;box-shadow:0 4px 18px rgba(0,0,0,.3);max-width:90%;text-align:center;
  pointer-events:none;opacity:0;transition:opacity .2s;
}
.gloss-pop.show{opacity:1}
.gloss-pop .ar{font-size:1.3rem;display:block}

.ww-grid{display:flex;flex-wrap:wrap;gap:8px;direction:rtl;margin-top:8px}
.ww-cell{background:var(--paper2);border-radius:10px;padding:6px 10px;text-align:center;flex-grow:1}
.ww-cell .a{font-family:var(--ar-font);font-size:1.45rem;line-height:1.7}
.ww-cell .g{font-size:.68rem;color:#5d6a63;direction:ltr}

/* ---------- Listes ---------- */
.list-item{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px 4px;border-bottom:1px solid var(--rule);
}
.list-item:last-child{border-bottom:none}
.list-item .ar{font-size:1.5rem;line-height:1.6}
.pill{font-size:.66rem;font-weight:700;border-radius:99px;padding:3px 9px;white-space:nowrap}
.pill.green{background:#E7F2EA;color:var(--green-dark)}
.pill.gold{background:var(--gold-soft);color:#5b430f}
.pill.grey{background:var(--paper2);color:#7a8680}
.pill.brick{background:#F6E4DE;color:var(--brick)}

.theme-chip{display:inline-block;font-size:.7rem;font-weight:600;background:var(--paper2);border-radius:99px;padding:4px 11px;margin:0 6px 6px 0;border:1px solid var(--rule)}
.theme-chip.active{background:var(--green);color:#F6F0E0;border-color:var(--green)}

/* ---------- Progression / stats ---------- */
.stats-row{display:flex;gap:10px;margin-bottom:14px}
.stat{
  flex:1;background:#FCF8EE;border:1px solid var(--rule);border-radius:var(--radius);
  padding:12px 8px;text-align:center;box-shadow:var(--shadow);
}
.stat .v{font-size:1.5rem;font-weight:800;color:var(--green)}
.stat .l{font-size:.66rem;color:#5d6a63;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.progressbar{height:8px;background:var(--paper2);border-radius:99px;overflow:hidden;margin-top:6px}
.progressbar>div{height:100%;background:var(--green);border-radius:99px;transition:width .4s}

/* ---------- Session ---------- */
.step-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.step-dots{display:flex;gap:5px}
.step-dots span{width:8px;height:8px;border-radius:50%;background:var(--rule)}
.step-dots span.done{background:var(--gold)}
.step-dots span.cur{background:var(--green);transform:scale(1.3)}
.grade-row{display:flex;gap:8px;margin-top:16px}
.grade-row .btn{flex:1;font-size:.85rem;padding:11px 6px}
.grade-again{background:#F6E4DE!important;color:var(--brick)!important}
.grade-good{background:var(--paper2)!important;color:var(--ink)!important}
.grade-easy{background:#E7F2EA!important;color:var(--green-dark)!important}

.done-splash{text-align:center;padding:30px 10px}
.done-splash .big{font-size:3rem;margin-bottom:8px}

/* ---------- Tajwid ---------- */
.taj-ex{background:var(--paper2);border-radius:12px;padding:12px;margin-top:8px}
.taj-ex .ar{font-size:1.7rem;text-align:center;line-height:2.1}
.taj-ex .note{font-size:.8rem;color:#5d6a63;text-align:center;margin-top:4px}
mark{background:var(--gold-soft);border-radius:4px;padding:0 2px}

/* ---------- Écriture / traçage ---------- */
.trace-wrap{position:relative;width:100%;height:250px;border:1.5px dashed var(--gold);border-radius:14px;background:#FFFDF6;overflow:hidden;touch-action:none;margin-top:10px}
.trace-wrap canvas{position:absolute;inset:0;width:100%;height:100%}
.trace-tools{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.trace-tools .btn{flex:1;min-width:90px}
.form-tabs{display:flex;gap:6px;margin-top:10px;direction:rtl}
.form-tabs button{flex:1;background:var(--paper2);border-radius:10px;padding:7px 2px;font-family:var(--ar-font);font-size:1.35rem;line-height:1.4;border:2px solid transparent}
.form-tabs button.on{border-color:var(--green);background:#E7F2EA}
.dir-hint{font-size:.75rem;color:var(--gold);font-weight:700;text-align:center;margin-top:6px;letter-spacing:.05em}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(23,36,31,.5);z-index:70;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--paper);border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:85vh;overflow-y:auto;padding:20px 18px 30px}
.modal-close{float:right;font-size:1.4rem;color:#7a8680;padding:2px 10px}

@media(min-width:560px){
  .big-ar{font-size:5.4rem}
  nav button{font-size:.7rem}
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>
<body>
<header>
  <div class="hdr-row">
    <div class="hdr-title"><span class="ar">اقْرَأْ</span> Iqra' 90</div>
    <div class="hdr-meta">
      <span class="badge" id="hdr-phase">Phase 1</span>
      <span class="badge gold" id="hdr-streak">🔥 0</span>
    </div>
  </div>
  <div class="day-ribbon">
    <span class="lbl" id="hdr-day">Jour 1 / 90</span>
    <div class="bar"><div id="hdr-bar" style="width:1%"></div></div>
  </div>
</header>
<main id="view"></main>
<div class="gloss-pop" id="gloss"></div>
<nav id="nav">
  <button data-v="home"><span class="ic">🏠</span>Accueil</button>
  <button data-v="alphabet"><span class="ic">ا</span>Alphabet</button>
  <button data-v="surahs"><span class="ic">📖</span>Sourates</button>
  <button data-v="vocab"><span class="ic">💬</span>Vocab</button>
  <button data-v="tajwid"><span class="ic">🎵</span>Tajwid</button>
</nav>
<script>
"use strict";
/* ============================================================
   IQRA' 90 — Apprendre à lire le Coran en 90 jours
   Phase 1 (j. 1-30) : alphabet, harakat, syllabes, premiers mots
   Phase 2 (j. 31-90) : sourates, mot-à-mot, Tajwid, vocabulaire
   Persistance : window.storage (Claude) ou localStorage (navigateur)
   ============================================================ */

/* ================= DONNÉES : ALPHABET ================= */
/* Ordre "Qaida modernisée" : lettres fréquentes et formes simples d'abord,
   pour débloquer très tôt les premiers mots du Coran. */
const HARAKAT = { fatha:"\u064E", kasra:"\u0650", damma:"\u064F", sukun:"\u0652",
  shadda:"\u0651", tanwF:"\u064B", tanwK:"\u064D", tanwD:"\u064C" };

const LETTERS = [
 {g:"ا",n:"Alif",tr:"â",son:"Voyelle longue « â ». Seule, elle porte la hamza (أ = a). Ne s'attache jamais à la lettre suivante.",tn:"Comme le « â » long de « bâb » (porte).",ecr:"Un simple trait vertical, tracé de haut en bas. La plus facile pour commencer."},
 {g:"ل",n:"Lâm",tr:"l",son:"« L » comme en français.",tn:"Comme dans « lila » (nuit).",ecr:"Trait vertical qui descend, puis courbe vers la gauche comme un hameçon qui remonte à peine."},
 {g:"م",n:"Mîm",tr:"m",son:"« M » comme en français.",tn:"Comme dans « mchit ».",ecr:"Une petite boucle ronde fermée sur la ligne, puis une queue verticale qui plonge sous la ligne."},
 {g:"ن",n:"Noûn",tr:"n",son:"« N » comme en français. Un point au-dessus.",tn:"Comme dans « nhar » (jour).",ecr:"Un bol profond et arrondi, tracé de droite à gauche ; le point au-dessus s'ajoute en dernier."},
 {g:"ب",n:"Bâ'",tr:"b",son:"« B » comme en français. Un point en dessous.",tn:"Comme dans « bab » (porte).",ecr:"Un bol long et peu profond posé sur la ligne, de droite à gauche ; le point en dessous, à la fin."},
 {g:"ي",n:"Yâ'",tr:"y / î",son:"« Y » consonne, ou voyelle longue « î » après kasra. Deux points en dessous.",tn:"Comme dans « yed » (main).",ecr:"Attachée : petit bol comme ب. Isolée : elle plonge sous la ligne et revient en forme de S ; deux points dessous à la fin."},
 {g:"ر",n:"Râ'",tr:"r",son:"« R » roulé du bout de la langue. Ne s'attache pas à la suivante.",tn:"Le « r » roulé tunisien, comme dans « raqad ».",ecr:"Un seul geste : petit trait qui glisse en courbe sous la ligne, vers la gauche."},
 {g:"ه",n:"Hâ'",tr:"h",son:"« H » très doux, un simple souffle expiré.",tn:"Comme le « h » de « houwa » (lui).",ecr:"Isolée : un rond fermé, tracé dans le sens antihoraire. Ses formes attachées changent beaucoup — observe-les avant de tracer."},
 {g:"و",n:"Wâw",tr:"w / oû",son:"« W », ou voyelle longue « oû » après damma. Ne s'attache pas à la suivante.",tn:"Comme dans « waqt » (temps).",ecr:"Une petite boucle comme le م, puis une queue courbe qui plonge sous la ligne comme un ر."},
 {g:"ت",n:"Tâ'",tr:"t",son:"« T » léger, comme en français. Deux points au-dessus.",tn:"Comme dans « tawa » (maintenant).",ecr:"Le même bol que ب ; deux points au-dessus, ajoutés en dernier."},
 {g:"ك",n:"Kâf",tr:"k",son:"« K » comme en français.",tn:"Comme dans « kelma » (mot).",ecr:"Comme un ل avec une base horizontale sur la ligne ; termine par la petite marque intérieure (comme une mini-hamza)."},
 {g:"د",n:"Dâl",tr:"d",son:"« D » léger. Ne s'attache pas à la suivante.",tn:"Comme dans « dar » (maison).",ecr:"Un angle : trait oblique qui descend vers la ligne, puis repart horizontalement à gauche. Ne passe jamais sous la ligne."},
 {g:"س",n:"Sîn",tr:"s",son:"« S » sifflant, léger.",tn:"Comme dans « sana » (année).",ecr:"Trois petites dents égales de droite à gauche, puis un grand bol final qui plonge sous la ligne."},
 {g:"ع",n:"'Ayn",tr:"ʿ",son:"Son guttural profond, contraction du fond de la gorge. N'existe pas en français.",tn:"Tu le connais bien : comme dans « ʿaslema » !",ecr:"Isolée : une petite tête ouverte (comme un c inversé), puis un grand croissant sous la ligne. Attachée en début : juste la tête."},
 {g:"ف",n:"Fâ'",tr:"f",son:"« F » comme en français. Un point au-dessus.",tn:"Comme dans « fama » (il y a).",ecr:"Une petite boucle fermée sur la ligne, puis un bol allongé ; le point au-dessus en dernier."},
 {g:"ق",n:"Qâf",tr:"q",son:"« Q » profond, prononcé du fond de la gorge (pas un « g »).",tn:"Le vrai « q » de « qal » en arabe littéraire — attention, pas le « g » de « gal » du dialecte.",ecr:"Comme ف, mais la queue plonge profondément sous la ligne comme un ن ; deux points au-dessus."},
 {g:"ح",n:"Ḥâ'",tr:"ḥ",son:"« H » fortement soufflé depuis la gorge, sans vibration. Différent du ه doux.",tn:"Comme dans « ḥout » (poisson).",ecr:"Un toit incliné de droite à gauche, puis un grand croissant qui plonge sous la ligne. Aucun point."},
 {g:"ج",n:"Jîm",tr:"j",son:"« J » comme dans « jour ». Un point en dessous.",tn:"Comme dans « jbal » (montagne).",ecr:"Exactement le geste de ح, puis un point au centre, en dessous du toit."},
 {g:"خ",n:"Khâ'",tr:"kh",son:"« KH » raclé, comme la jota espagnole. Un point au-dessus.",tn:"Comme dans « khobz » (pain).",ecr:"Exactement le geste de ح, puis un point au-dessus."},
 {g:"ش",n:"Chîn",tr:"ch",son:"« CH » comme dans « chat ». Trois points au-dessus.",tn:"Comme dans « chnowa » (quoi).",ecr:"Comme س (trois dents + bol) ; les trois points au-dessus, en triangle, à la fin."},
 {g:"ص",n:"Ṣâd",tr:"ṣ",son:"« S » emphatique : la bouche s'arrondit, le son est grave et plein.",tn:"Comme dans « ṣbaḥ » (matin) — plus lourd que le س.",ecr:"Une boucle ovale allongée (comme un œil couché), puis le bol final de س sous la ligne."},
 {g:"ض",n:"Ḍâd",tr:"ḍ",son:"« D » emphatique, grave. La lettre emblématique de l'arabe.",tn:"Comme dans « ḍaw » (lumière).",ecr:"Comme ص, avec un point au-dessus en dernier."},
 {g:"ط",n:"Ṭâ'",tr:"ṭ",son:"« T » emphatique, grave et plein.",tn:"Comme dans « ṭfol » (enfant).",ecr:"L'ovale de ص posé sur la ligne, surmonté d'un trait vertical planté dessus (tracé en dernier)."},
 {g:"ظ",n:"Ẓâ'",tr:"ẓ",son:"« DH » emphatique : comme ذ mais grave.",tn:"Proche du « dh » lourd de « ḍhher » selon les régions.",ecr:"Comme ط, avec un point au-dessus."},
 {g:"ذ",n:"Dhâl",tr:"dh",son:"« DH » : langue entre les dents, comme le « th » anglais de « this ». Ne s'attache pas à la suivante.",tn:"Comme dans « dheb » (or) — le tunisien a gardé ce son !",ecr:"Comme د (angle sans passer sous la ligne), avec un point au-dessus."},
 {g:"ث",n:"Thâ'",tr:"th",son:"« TH » : langue entre les dents, comme « think » en anglais. Trois points au-dessus.",tn:"Comme dans « thlêtha » (trois).",ecr:"Le même bol que ب ; trois points au-dessus en triangle."},
 {g:"ز",n:"Zây",tr:"z",son:"« Z » comme en français. Ne s'attache pas à la suivante.",tn:"Comme dans « zit » (huile).",ecr:"Comme ر (courbe sous la ligne), avec un point au-dessus."},
 {g:"غ",n:"Ghayn",tr:"gh",son:"« GH » : comme un « r » parisien grasseyé, au fond de la gorge.",tn:"Comme dans « ghali » (cher).",ecr:"Comme ع (tête + croissant), avec un point au-dessus."}
];
const NO_CONNECT = new Set(["ا","د","ذ","ر","ز","و"]);
function letterForms(g){
  const T="\u0640"; // tatwil
  return { iso:g, ini:NO_CONNECT.has(g)? g : g+T, med:NO_CONNECT.has(g)? T+g : T+g+T, fin:T+g };
}

  day:1, streak:0, lastDone:null, // lastDone = "YYYY-MM-DD" de la dernière session terminée
  srs:{},            // id -> {lvl:0-5, due:"YYYY-MM-DD"}  (L:i lettres, W:i mots P1, V:i vocab, S:i sourates)
  seenLetters:0,     // nb de lettres introduites
  vocabSeen:0,       // nb de mots de vocab débloqués et vus
  surahStage:{},     // idx sourate -> étape de mémorisation atteinte (0-4)
  completedDays:{},  // jour -> true
  sessionStep:0
};
let S = JSON.parse(JSON.stringify(DEFAULT_STATE));

const store = {
  async load(){
    try{ if(window.storage){ const r = await window.storage.get("iqra90"); if(r&&r.value) return JSON.parse(r.value);} }catch(e){}
    try{ const v = localStorage.getItem("iqra90"); if(v) return JSON.parse(v);}catch(e){}
    return null;
  },
  async save(){
    const j = JSON.stringify(S);
    let saved=false;
    try{ if(window.storage){ await window.storage.set("iqra90", j); saved=true;} }catch(e){}
    if(!saved){ try{ localStorage.setItem("iqra90", j);}catch(e){} }
  }
};

const todayStr = ()=> new Date().toISOString().slice(0,10);
const addDays = (s,n)=>{ const d=new Date(s+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const isWeekend = ()=>{ const d=new Date().getDay(); return d===0||d===6; };
const INTERVALS = [1,1,2,4,7,15,30];

function srsGet(id){ return S.srs[id] || {lvl:0, due:todayStr()}; }
function srsGrade(id, grade){ // grade: 0 raté, 1 correct, 2 facile
  const it = srsGet(id);
  if(grade===0){ it.lvl = Math.max(0, it.lvl-2); it.due = todayStr(); }
  else { it.lvl = Math.min(6, it.lvl + grade); it.due = addDays(todayStr(), INTERVALS[it.lvl]); }
  S.srs[id]=it; store.save();
}
function srsDue(prefix, limit){
  const t = todayStr(); const out=[];
  for(const [id,it] of Object.entries(S.srs)){
    if(id.startsWith(prefix) && it.due<=t) out.push({id,lvl:it.lvl});
  }
  out.sort((a,b)=>a.lvl-b.lvl);
  return limit? out.slice(0,limit): out;
}
function mastery(id){ return Math.round(srsGet(id).lvl/6*100); }

/* ================= PROGRAMME ================= */
function lettersIntroducedByDay(day){ return Math.min(28, Math.max(0, Math.min(day,14)*2)); }
function phase(){ return S.day<=30? 1:2; }
function surahForDay(day){
  for(let i=0;i<SURAHS.length;i++){ const s=SURAHS[i]; if(day>=s.d1 && day<=s.d2) return {idx:i, s, rel:(day-s.d1)/(s.d2-s.d1||1)}; }
  return null; // jours 88-90 : révision
}
function tajwidForDay(day){ return TAJWID.find(t=>t.day===day) || null; }
function tajwidUnlocked(){ return TAJWID.filter(t=>t.day<=S.day); }
function vocabUnlockedCount(){ if(S.day<=30) return 0; return Math.min(VOCAB.length, (S.day-30)*Math.ceil(VOCAB.length/60)); }

function esc(t){ return String(t).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function seededPick(seed, arr, frac){ // choix déterministe de mots à masquer
  let x = seed*2654435761 % 4294967296; const n = Math.max(1, Math.round(arr.length*frac)); const idxs=new Set();
  let guard=0;
  while(idxs.size<n && guard<500){ x = (x*1103515245+12345)%2147483648; idxs.add(x%arr.length); guard++; }
  return idxs;
}

function setMem(idx, mode){
  memMode=mode;
  for(let m=0;m<4;m++){ const b=$("#mm"+m); if(b){ b.classList.toggle("gold", m===mode); b.classList.toggle("ghost", m!==mode);} }
  const s=SURAHS[idx];
  const fracs=[0,.3,.6,.9];
  let html = '<div class="mushaf"><div class="ar">';
  if(s.basmala) html += '<div style="font-size:1.35rem;color:var(--green-dark);margin-bottom:8px">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>';
  s.vv.forEach((v,vi)=>{
    const masked = mode>0? seededPick(idx*100+vi*7+mode, v.w, fracs[mode]) : new Set();
    v.w.forEach((w,wi)=>{
      const isM = masked.has(wi);
      html += `<span class="w ${isM?'masked':''}" data-ar="${esc(w[0])}" data-fr="${esc(w[1])}" onclick="tapWord(this)">${esc(w[0])}</span> `;

    html += `<span class="vnum">${vi+1}</span> `;
  });
  html += '</div></div>';

}

  $("#ww-holder").innerHTML=html;
}

/* ================= ÉCRITURE : traçage sur canvas ================= */
const TRACE = {};
function traceHTML(uid, letterIdx){
  const f = letterForms(LETTERS[letterIdx].g);
  return `
  <div class="form-tabs" id="ft-${uid}">
    <button class="on" onclick="traceForm('${uid}','iso')">${f.iso}</button>
    <button onclick="traceForm('${uid}','ini')">${f.ini}</button>
    <button onclick="traceForm('${uid}','med')">${f.med}</button>
    <button onclick="traceForm('${uid}','fin')">${f.fin}</button>
  </div>
  <div class="trace-wrap" id="tw-${uid}">
    <canvas id="tpl-${uid}"></canvas>
    <canvas id="ink-${uid}"></canvas>
  </div>
  <div class="dir-hint">← sens de l'écriture : commence à DROITE, les points en dernier</div>
  <div class="trace-tools">
    <button class="btn ghost small-btn" onclick="traceClear('${uid}')">Effacer ↺</button>
    <button class="btn ghost small-btn" id="tm-${uid}" onclick="traceModel('${uid}')">Masquer le modèle</button>
  </div>`;
}
function initTrace(uid, letterIdx){
  const wrap = document.getElementById("tw-"+uid);
  if(!wrap) return;
  const tpl = document.getElementById("tpl-"+uid), ink = document.getElementById("ink-"+uid);
  const dpr = window.devicePixelRatio||1;
  const W = wrap.clientWidth||320, H = wrap.clientHeight||250;
  [tpl,ink].forEach(c=>{ c.width=W*dpr; c.height=H*dpr; });
  let tctx=null, ictx=null;
  try{ tctx=tpl.getContext("2d"); ictx=ink.getContext("2d"); }catch(e){}
  if(!tctx||!ictx) return;
  tctx.scale(dpr,dpr); ictx.scale(dpr,dpr);
  TRACE[uid] = {letterIdx, form:"iso", showModel:true, W, H, tctx, ictx, drawing:false};
  drawTemplate(uid);
  // dessin au doigt / souris
  const pos = e=>{ const r=ink.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; };
  ink.addEventListener("pointerdown", e=>{ const t=TRACE[uid]; t.drawing=true; const p=pos(e);
    ictx.beginPath(); ictx.moveTo(p.x,p.y); ink.setPointerCapture(e.pointerId); e.preventDefault(); });
  ink.addEventListener("pointermove", e=>{ const t=TRACE[uid]; if(!t.drawing) return; const p=pos(e);
    ictx.lineTo(p.x,p.y); ictx.strokeStyle="#0E5B47"; ictx.lineWidth=7; ictx.lineCap="round"; ictx.lineJoin="round"; ictx.stroke(); e.preventDefault(); });
  const stop = ()=>{ if(TRACE[uid]) TRACE[uid].drawing=false; };
  ink.addEventListener("pointerup", stop); ink.addEventListener("pointercancel", stop);
}
function drawTemplate(uid){
  const t=TRACE[uid]; if(!t) return;
  const {tctx,W,H}=t;
  tctx.clearRect(0,0,W,H);
  // ligne d'écriture
  tctx.strokeStyle="#D8CBAB"; tctx.lineWidth=1.5;
  tctx.setLineDash([6,6]);
  tctx.beginPath(); tctx.moveTo(14, H*0.62); tctx.lineTo(W-14, H*0.62); tctx.stroke();
  tctx.setLineDash([]);
  if(!t.showModel) return;
  const f = letterForms(LETTERS[t.letterIdx].g)[t.form];
  tctx.fillStyle="#E3D7B8";
  tctx.font = "150px "+getComputedStyle(document.documentElement).getPropertyValue("--ar-font");
  tctx.textAlign="center"; tctx.textBaseline="alphabetic";
  tctx.fillText(f, W/2, H*0.62);
}
function traceForm(uid, form){
  const t=TRACE[uid]; if(!t) return;
  t.form=form; drawTemplate(uid); traceClearInk(uid);
  const tabs = document.querySelectorAll("#ft-"+uid+" button");
  const order=["iso","ini","med","fin"];
  tabs.forEach((b,i)=> b.classList.toggle("on", order[i]===form));
}
function traceClearInk(uid){ const t=TRACE[uid]; if(t) t.ictx.clearRect(0,0,t.W,t.H); }
function traceClear(uid){ traceClearInk(uid); }
function traceModel(uid){
  const t=TRACE[uid]; if(!t) return;
  t.showModel=!t.showModel; drawTemplate(uid);
  const b=document.getElementById("tm-"+uid);
  if(b) b.textContent = t.showModel? "Masquer le modèle":"Afficher le modèle";
}

/* ================= MOTEUR DE SESSION ================= */
let sess = null;
function startSession(){ sess = buildSession(); S.sessionStep=0; go("session"); }

function buildSession(){
  const d=S.day, steps=[];
  const wk = isWeekend();
  if(phase()===1){
    if(d<=14){
      steps.push({k:"intro", letters:[(d-1)*2,(d-1)*2+1]});
      steps.push({k:"write", ids:[(d-1)*2,(d-1)*2+1]});
    } else {
      steps.push({k:"lesson", topic:P1_TOPICS[d]});
      const known1 = lettersIntroducedByDay(d);
      const weak = [...Array(known1).keys()].sort((a,b)=>srsGet("L:"+a).lvl-srsGet("L:"+b).lvl).slice(0,2);
      steps.push({k:"write", ids:weak});
    }
    const due = srsDue("L:", wk?10:6).map(o=>parseInt(o.id.slice(2)));
    const fresh = d<=14? [(d-1)*2,(d-1)*2+1] : [];
    const flashIds = [...new Set([...fresh, ...due])];
    if(flashIds.length) steps.push({k:"flash", ids:flashIds});
    steps.push({k:"qcm", n: wk?6:4});
    steps.push({k:"read"});
    const sd1 = surahForDay(d);
    if(sd1 && sd1.s.kursi){
      const stage = Math.min(3, Math.floor(sd1.rel*3.5));
      steps.push({k:"memo", idx:sd1.idx, mode:stage});
    }
  } else {
    const taj = tajwidForDay(d);
    if(taj) steps.push({k:"tajwid", taj});
    const sd = surahForDay(d);
    if(sd){
      const stage = Math.min(3, Math.floor(sd.rel*3.5));
      steps.push({k:"memo", idx:sd.idx, mode:stage});
    } else {
      const weakest = SURAHS.map((s,i)=>({i,lvl:srsGet("S:"+i).lvl})).sort((a,b)=>a.lvl-b.lvl).slice(0,2);
      weakest.forEach(w=> steps.push({k:"memo", idx:w.i, mode:3}));
    }
    const dueS = srsDue("S:", wk?2:1).map(o=>parseInt(o.id.slice(2))).filter(i=>!sd||i!==sd.idx);
    dueS.forEach(i=> steps.push({k:"memo", idx:i, mode:2, review:true}));
    steps.push({k:"vocabNew"});
    steps.push({k:"vocabQuiz", n: wk?8:5});
    if(wk && sd) steps.push({k:"readExt", idx:Math.max(0,sd.idx-1)});
  }
  steps.push({k:"done"});
  return {steps, i:0, flashI:0, writeI:0, qcmDone:0, qcmTarget:0};
}
function nextStep(){ sess.i++; renderSession(); }

  }

  if(st.k==="tajwid"){
    view.innerHTML = head + `<div class="card"><div class="eyebrow">Nouvelle règle de Tajwid</div><h2>${esc(st.taj.t)}</h2><p style="margin-top:8px">${st.taj.body}</p>
      ${st.taj.ex.map(e=>`<div class="taj-ex"><div class="ar">${e.ar}</div><div class="note">${esc(e.note)}</div></div>`).join("")}</div>
      <button class="btn" onclick="nextStep()">Compris ▸</button>`;
    return;
  }

  if(st.k==="write"){
    if(sess.writeI>=st.ids.length){ sess.writeI=0; nextStep(); return; }
    const i = st.ids[sess.writeI];
    const l = LETTERS[i];
    view.innerHTML = head + `
      <div class="card">
        <div class="eyebrow">Écriture ${sess.writeI+1}/${st.ids.length} — ${esc(l.n)}</div>
        <h2>Trace la lettre <span class="ar" style="font-size:1.9rem">${l.g}</span> au doigt</h2>
        <p class="small" style="margin-top:6px">✍️ ${esc(l.ecr)}</p>
        ${traceHTML("sess", i)}
        <p class="muted small" style="margin-top:8px">Repasse sur le modèle 3-4 fois par forme, puis masque le modèle et écris de mémoire. Change de forme avec les onglets (isolée → initiale → médiane → finale).</p>
      </div>
      <button class="btn" onclick="sess.writeI++;renderSession()">${sess.writeI+1<st.ids.length? "Lettre suivante ▸":"Écriture terminée ▸"}</button>`;
    initTrace("sess", i);
    return;
  }


  if(st.k==="flash"){
    if(sess.flashI>=st.ids.length){ sess.flashI=0; nextStep(); return; }
    const i = st.ids[sess.flashI];
    const l=LETTERS[i], f=letterForms(l.g);

      <div class="card" style="padding:10px 18px"><span class="muted small">Flashcard ${sess.flashI+1}/${st.ids.length} — quelle est cette lettre ? Touche pour retourner.</span></div>
      <div class="flash" id="flash" onclick="flipFlash()">
        <div id="flash-front"><div class="big-ar">${l.g}</div><div class="hint">toucher pour voir la réponse</div></div>
        <div id="flash-back" style="display:none">

        </div>
      </div>
      <div class="grade-row" id="flash-grades" style="visibility:hidden">
        <button class="btn grade-again" onclick="gradeFlash(${i},0)">Raté</button>
        <button class="btn grade-good" onclick="gradeFlash(${i},1)">Correct</button>
        <button class="btn grade-easy" onclick="gradeFlash(${i},2)">Facile</button>
      </div>`;
    return;
  }

  if(st.k==="qcm"){
    if(sess.qcmTarget===0){ sess.qcmTarget=st.n; sess.qcmDone=0; }
    if(sess.qcmDone>=sess.qcmTarget){ sess.qcmTarget=0; nextStep(); return; }
    const known = lettersIntroducedByDay(S.day);
    const pool = shuffle([...Array(known).keys()]);
    const answer = pool[0];
    const opts = shuffle(pool.slice(0,4));
    const l=LETTERS[answer];
    view.innerHTML = head + `
      <div class="card"><div class="eyebrow">QCM ${sess.qcmDone+1}/${sess.qcmTarget}</div>
      <h2>Quelle lettre fait ce son ?</h2>
      <p>« ${esc(l.son)} »</p>
      <div class="qcm-opts">${opts.map(o=>`<button class="qcm-opt" data-i="${o}" onclick="answerQCM(this,${answer})">${LETTERS[o].g}</button>`).join("")}</div>
      </div>`;

  if(st.k==="read"){
    const known = lettersIntroducedByDay(S.day);
    let items=[];
    if(P1_READING[S.day]) items = P1_READING[S.day];
    else {
      const cons = [...Array(known).keys()].filter(i=>!["ا","و","ي"].includes(LETTERS[i].g));
      const picks = shuffle(cons).slice(0,4);
      const H=[HARAKAT.fatha,HARAKAT.kasra,HARAKAT.damma];
      picks.forEach(p=>{
        const h1=H[Math.floor(Math.random()*3)];
        items.push(LETTERS[p].g+h1);
        if(known>=4){
          const q=cons[Math.floor(Math.random()*cons.length)];
          items.push(LETTERS[p].g+h1+LETTERS[q].g+H[Math.floor(Math.random()*3)]);
        }
      });
      P1_WORDS.filter(w=>w.unlock<=S.day).slice(-4).forEach(w=>items.push(w.a));
    }
    view.innerHTML = head + `
      <div class="card"><div class="eyebrow">Lecture à voix haute</div>

  if(st.k==="memo"){

        <button class="btn grade-again" onclick="gradeMemoStep(${st.idx},0)">À revoir</button>

        <button class="btn grade-easy" onclick="gradeMemoStep(${st.idx},2)">Parfait</button>
      </div>`;
    memMode = st.mode;
    setMemInline(st.idx, st.mode);
    return;
  }

  if(st.k==="vocabNew"){
    const rate = Math.ceil(VOCAB.length/60);
    const end = vocabUnlockedCount();
    const start = Math.max(0, end-rate);

    view.innerHTML = head + `

    const n = vocabUnlockedCount();

    const due = srsDue("V:").map(o=>parseInt(o.id.slice(2))).filter(i=>i<n);

  if(st.k==="readExt"){

    view.innerHTML = head + `

        ${!doneAll? `<div class="btn-row"><button class="btn gold" onclick="nextDay()">Passer au jour ${S.day+1} ▸▸</button></div>`:""}
        <div class="btn-row"><button class="btn secondary" onclick="go('home')">Retour à l'accueil</button></div>
      </div>`;
    return;
  }
}
function setMemInline(idx, mode){
  const s=SURAHS[idx];
  const fracs=[0,.3,.6,.9];
  let html = '<div class="mushaf"><div class="ar">';
  if(s.basmala) html += '<div style="font-size:1.35rem;color:var(--green-dark);margin-bottom:8px">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>';
  s.vv.forEach((v,vi)=>{
    const masked = mode>0? seededPick(idx*100+vi*7+mode, v.w, fracs[mode]) : new Set();
    v.w.forEach((w,wi)=>{
      html += `<span class="w ${masked.has(wi)?'masked':''}" data-ar="${esc(w[0])}" data-fr="${esc(w[1])}" onclick="tapWord(this)">${esc(w[0])}</span> `;
    });
    html += `<span class="vnum">${vi+1}</span> `;
  });
  html += '</div></div>';
  $("#mushaf-holder").innerHTML = html;
}
function flipFlash(){
  $("#flash-front").style.display="none";
  $("#flash-back").style.display="block";
  $("#flash-grades").style.visibility="visible";
}
function gradeFlash(i, g){ srsGrade("L:"+i, g); sess.flashI++; renderSession(); }
function answerQCM(el, answer){
  const chosen = parseInt(el.dataset.i);
  document.querySelectorAll(".qcm-opt").forEach(b=>b.onclick=null);
  if(chosen===answer){ el.classList.add("good"); srsGrade("L:"+answer,1); }
  else{
    el.classList.add("bad");
    document.querySelectorAll(".qcm-opt").forEach(b=>{ if(parseInt(b.dataset.i)===answer) b.classList.add("good"); });
    srsGrade("L:"+answer,0);
  }
  sess.qcmDone++;
  setTimeout(renderSession, 900);
}
function answerVocab(el, chosen, answer){
  document.querySelectorAll(".qcm-opt").forEach(b=>b.onclick=null);
  if(chosen===answer){ el.classList.add("good"); srsGrade("V:"+answer,1); }
  else{
    el.classList.add("bad");
    document.querySelectorAll(".qcm-opt").forEach((b,bi)=>{ if(b.textContent===VOCAB[answer][1]) b.classList.add("good"); });
    srsGrade("V:"+answer,0);
  }
  sess.qcmDone++;
  setTimeout(renderSession, 900);
}
function gradeRead(g){
  const known = lettersIntroducedByDay(S.day);
  if(g===0){ for(let i=Math.max(0,known-4);i<known;i++) srsGrade("L:"+i,0); }
  nextStep();
}
function gradeMemoStep(idx, g){
  srsGrade("S:"+idx, g);
  if(g>0) S.surahStage[idx]=Math.min(4, Math.max(S.surahStage[idx]||0, memMode+1));
  store.save();
  nextStep();
}
function markVocabSeen(end){
  const rate = Math.ceil(VOCAB.length/60);
  for(let i=Math.max(0,end-rate);i<end;i++){ if(!S.srs["V:"+i]) S.srs["V:"+i]={lvl:0,due:addDays(todayStr(),1)}; }
  store.save();
}
function finishSession(){
  const t = todayStr();
  if(!S.completedDays[S.day]){
    S.completedDays[S.day]=true;
    if(S.lastDone){
      const gap = Math.round((new Date(t)-new Date(S.lastDone))/86400000);
      S.streak = gap===0? S.streak : gap===1? S.streak+1 : 1;
    } else S.streak = 1;
    S.lastDone = t;
    if(S.day<=14) S.seenLetters = Math.max(S.seenLetters, S.day*2);
    store.save();
  }
  updateHeader();
}

/* ================= SAUVEGARDE : EXPORT / IMPORT ================= */
function exportProgress(){
  const data = JSON.stringify(S, null, 1);
  const blob = new Blob([data], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "iqra90-progression-"+todayStr()+".json";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
  showGloss("","Export créé — garde ce fichier précieusement ✓");
}
function importProgress(input){
  const f = input.files && input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const d = JSON.parse(r.result);
      if(typeof d.day!=="number" || typeof d.srs!=="object") throw new Error("format");
      S = Object.assign({}, JSON.parse(JSON.stringify(DEFAULT_STATE)), d);
      store.save();
      go("home");
      showGloss("","Progression restaurée ✓ — jour "+S.day+", streak "+S.streak);
    }catch(e){ showGloss("","Fichier invalide — utilise un export Iqra' 90"); }
    input.value="";
  };
  r.readAsText(f);
}

/* ================= INIT ================= */
document.getElementById("nav").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(b) go(b.dataset.v);
});
(async function init(){
  const saved = await store.load();
  if(saved) S = Object.assign({}, DEFAULT_STATE, saved);
  go("home");
})();
</script>
